services:
  aggregator:
    build: ./aggregator
    image: uas-aggregator:latest
    container_name: uas-aggregator
    depends_on:
      storage:
        condition: service_healthy
      broker:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://user:pass@storage:5432/db
      - BROKER_URL=redis://broker:6379
      - CONSUMER_WORKERS=4
    ports:
      - "8080:8080"          # expose hanya untuk demo lokal
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8080/readyz').status==200 else sys.exit(1)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  publisher:
    build: ./publisher
    image: uas-publisher:latest
    container_name: uas-publisher
    depends_on:
      aggregator:
        condition: service_healthy
    environment:
      - TARGET_URL=http://aggregator:8080/publish
      - TOTAL_EVENTS=20000
      - DUP_RATE=0.3
      - BATCH_SIZE=100
      - NUM_TOPICS=5
    networks:
      - internal
    # Publisher adalah job sekali jalan; tidak restart otomatis.
    restart: "no"

  broker:
    image: redis:7-alpine
    container_name: uas-broker
    # Tidak expose port ke host -> tetap internal.
    networks:
      - internal
    volumes:
      - broker_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  storage:
    image: postgres:16-alpine
    container_name: uas-storage
    environment:
      - POSTGRES_DB=db
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
    networks:
      - internal
    volumes:
      - pg_data:/var/lib/postgresql/data    # persistensi via named volume
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d db"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

networks:
  internal:
    driver: bridge

volumes:
  pg_data:
  broker_data: